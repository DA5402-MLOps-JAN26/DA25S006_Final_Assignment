<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Fit Analyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.1);
      padding: 40px;
      width: 100%;
      max-width: 700px;
    }

    h1 {
      font-size: 1.8rem;
      color: #1a202c;
      margin-bottom: 6px;
    }

    .subtitle {
      color: #718096;
      margin-bottom: 32px;
      font-size: 0.95rem;
    }

    label {
      display: block;
      font-weight: 600;
      color: #2d3748;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .upload-area {
      border: 2px dashed #cbd5e0;
      border-radius: 10px;
      padding: 24px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 24px;
      transition: border-color 0.2s;
      background: #f7fafc;
    }

    .upload-area:hover { border-color: #4299e1; }

    .upload-area input { display: none; }

    .upload-area .icon { font-size: 2rem; margin-bottom: 8px; }

    .upload-area p {
      color: #718096;
      font-size: 0.9rem;
    }

    .file-selected {
      color: #2b6cb0;
      font-weight: 600;
      font-size: 0.9rem;
      margin-top: 8px;
    }

    textarea {
      width: 100%;
      height: 160px;
      border: 1px solid #cbd5e0;
      border-radius: 10px;
      padding: 14px;
      font-size: 0.9rem;
      resize: vertical;
      outline: none;
      font-family: inherit;
      color: #2d3748;
      margin-bottom: 24px;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #4299e1; }

    button {
      width: 100%;
      padding: 14px;
      background: #3182ce;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #2b6cb0; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .result {
      margin-top: 28px;
      padding: 24px;
      border-radius: 12px;
      text-align: center;
      display: none;
    }

    .result.good     { background: #f0fff4; border: 2px solid #68d391; }
    .result.potential { background: #fffaf0; border: 2px solid #f6ad55; }
    .result.nofit    { background: #fff5f5; border: 2px solid #fc8181; }

    .result .badge {
      font-size: 2.5rem;
      margin-bottom: 8px;
    }

    .result .verdict {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .result.good     .verdict { color: #276749; }
    .result.potential .verdict { color: #c05621; }
    .result.nofit    .verdict { color: #9b2c2c; }

    .result .meta {
      font-size: 0.85rem;
      color: #718096;
      margin-top: 8px;
    }

    .error {
      margin-top: 20px;
      padding: 14px;
      background: #fff5f5;
      border: 1px solid #fc8181;
      border-radius: 10px;
      color: #c53030;
      font-size: 0.9rem;
      display: none;
    }

    .spinner {
      display: none;
      text-align: center;
      margin-top: 20px;
      color: #718096;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Resume Fit Analyzer</h1>
    <p class="subtitle">Upload a resume and paste a job description to check the fit.</p>

    <!-- Resume Upload -->
    <label>Resume (PDF)</label>
    <div class="upload-area" onclick="document.getElementById('resumeInput').click()">
      <div class="icon">📄</div>
      <p>Click to upload your resume PDF</p>
      <input type="file" id="resumeInput" accept=".pdf" onchange="onFileSelected(this)" />
      <div class="file-selected" id="fileName"></div>
    </div>

    <!-- Job Description -->
    <label>Job Description</label>
    <textarea
      id="jdInput"
      placeholder="Paste the job description here..."
    ></textarea>

    <!-- Submit -->
    <button id="analyzeBtn" onclick="analyze()">Analyse</button>

    <!-- Spinner -->
    <div class="spinner" id="spinner">⏳ Analysing...</div>

    <!-- Error -->
    <div class="error" id="errorBox"></div>

    <!-- Result -->
    <div class="result" id="resultBox">
      <div class="badge" id="resultBadge"></div>
      <div class="verdict" id="resultVerdict"></div>
      <div class="meta" id="resultMeta"></div>
    </div>
  </div>

  <script>
    const API_BASE_URL = "http://localhost:8000";

    function onFileSelected(input) {
      const fileName = input.files[0]?.name || "";
      document.getElementById("fileName").textContent = fileName
        ? "Selected: " + fileName
        : "";
    }

    async function analyze() {
      const fileInput = document.getElementById("resumeInput");
      const jdInput   = document.getElementById("jdInput").value.trim();
      const btn       = document.getElementById("analyzeBtn");
      const spinner   = document.getElementById("spinner");
      const errorBox  = document.getElementById("errorBox");
      const resultBox = document.getElementById("resultBox");

      // reset
      errorBox.style.display  = "none";
      resultBox.style.display = "none";

      // validate
      if (!fileInput.files[0]) {
        showError("Please upload a resume PDF.");
        return;
      }
      if (!jdInput) {
        showError("Please paste a job description.");
        return;
      }

      // show spinner
      btn.disabled        = true;
      spinner.style.display = "block";

      try {
        const formData = new FormData();
        formData.append("resume", fileInput.files[0]);
        formData.append("job_description", jdInput);

        const response = await fetch(`${API_BASE_URL}/predict`, {
          method: "POST",
          body: formData,
        });

        if (!response.ok) {
          const err = await response.json();
          throw new Error(err.detail || "Server error");
        }

        const data = await response.json();
        showResult(data);

      } catch (err) {
        showError(err.message);
      } finally {
        btn.disabled          = false;
        spinner.style.display = "none";
      }
    }

    function showResult(data) {
      const resultBox    = document.getElementById("resultBox");
      const badge        = document.getElementById("resultBadge");
      const verdict      = document.getElementById("resultVerdict");
      const meta         = document.getElementById("resultMeta");

      const config = {
        "Good Fit":      { emoji: "🟢", cls: "good" },
        "Potential Fit": { emoji: "🟡", cls: "potential" },
        "No Fit":        { emoji: "🔴", cls: "nofit" },
      };

      const cfg = config[data.label] || { emoji: "⚪", cls: "" };

      resultBox.className    = "result " + cfg.cls;
      badge.textContent      = cfg.emoji;
      verdict.textContent    = data.label;
      meta.textContent       = `Confidence: ${(data.confidence * 100).toFixed(1)}%  |  Latency: ${data.latency_ms} ms`;
      resultBox.style.display = "block";
    }

    function showError(msg) {
      const errorBox = document.getElementById("errorBox");
      errorBox.textContent    = "⚠️ " + msg;
      errorBox.style.display  = "block";
    }
  </script>
</body>
</html>
